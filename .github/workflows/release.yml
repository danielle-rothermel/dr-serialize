name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dr-serialize
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv build
      # Publishes via PyPI Trusted Publishing (OIDC) — no API token.
      # Requires this repo/workflow to be registered as a (pending)
      # publisher for the dr-serialize project on pypi.org.
      - uses: pypa/gh-action-pypi-publish@release/v1
