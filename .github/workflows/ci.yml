name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: depot-ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.3.1
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ty check
      - run: uv run pytest
